<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>

    <p>
        Em HTML5, podemos enserir os elementos da lista a seguir: Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.
    </p>

    <ul>
        <li>
            <abbr title="Use a tag <p>"><ins>Parágrafos</ins></abbr>
        </li>
        <li>
            <abbr title="Use as tags <h1>...<h6>"><ins>Títulos</ins></abbr>
        </li>
        <li>
            <abbr title="Use a tag <img>"><ins>Imagens</ins></abbr>
        </li>
        <li>
            <abbr title="Use a tag <abbr>"><ins>Abreviações</ins></abbr>
        </li>
        <li>
            <abbr title="Use a tag <code>"><ins>Códigos-fonte</ins></abbr>
        </li>
        <li>
            <abbr title="Use as tags <ol> e <li>"><ins>Listas numeradas</ins></abbr>
        </li>
        <li>
            <abbr title="Use as tags <ul> e <li>"><ins>Listas com demarcadores</ins></abbr>
        </li>
    </ul>
</body>
</html>
